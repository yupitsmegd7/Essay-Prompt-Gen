<!DOCTYPE html>

<html>

<head>
    <title>Prompt Family</title>
    <link rel="stylesheet" href="Styling.css">
    <script src="Scripter.js" defer></script>
</head>

<body>

    <div class="Outerbox">

        <div class="Innerbox">

            <div class="Title">
                Essay Prompt Family
            </div>

            <div class="hook">
                <p>Have you ever</p>
                <p>Wanted to write an Essay / Poem / Story</p>
                <p>Just for your interest or for practice</p>
                <p>But didn't have a topic to start with?</p>
                <p style="margin-top: 20px;"><b>Worry Not</b></p>
                <p style="margin-top: 20px;">Generate a prompt and take off</p>
            </div>

            <div class="mid">Themes</div>

            <div class="themes">

                <button class="gener">Nature</button>
                <button class="gener">Nostalgia</button>
                <button class="gener">Movies</button>
                <button class="gener">Politics</button>
                <button class="gener">Sports</button>
                <button class="gener">Collage</button>
                <button class="gener">Painting</button>
                <button class="gener">Poetry</button>
                <button class="gener">Philosophical</button>
                <button class="gener">Social Media</button>
                <button class="gener">Party</button>
                <button class="gener">Emotions</button>
                <button class="gener">Books</button>
                <button class="gener">Shopping</button>
                <button class="gener">Cars</button>
                <button class="gener">Sports</button>
                <button class="gener">Memories</button>
                <button class="gener">Inner self</button>
                <button class="gener">Family</button>
                <button class="gener">Video Games</button>
                <button class="gener">Morals</button>

            </div>

            <div class="mid" id="toneSection">Tone</div>

            <div class="themes">

                <button class="gener">Dark</button>
                <button class="gener">Serious</button>
                <button class="gener">Suspense</button>
                <button class="gener">Funny</button>
                <button class="gener">Mysterious</button>
                <button class="gener">Optimistic</button>
                <button class="gener">Pessimistic</button>
                <button class="gener">Sentimental</button>
                <button class="gener">Emotional</button>
                <button class="gener">Dramatic</button>
                <button class="gener">Sad</button>
                <button class="gener">Angry</button>
            </div>

            <div class="mid">Format</div>

            <div class="themes">

                <button class="gener">Short</button>
                <button class="gener">Medium</button>
                <button class="gener">Large</button>
                <button class="gener">Poetry</button>
                <button class="gener">Speech</button>
                <button class="gener">Conversation</button>

            </div>

            <button id="generateBtn">Generate Prompts</button>


            <div class="midd" id="generatedTitle">Generated Prompts</div>

            <div class="promptBox" id="promptOutput" readonly placeholder="Your generated prompt will appear here..."></div>


</body>

</html>
